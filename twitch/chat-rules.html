<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Rules - Twitch Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9146ff 0%, #140028 100%);
            min-height: 100vh;
            color: #fff;
        }

        body {
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            background: rgba(145, 70, 255, 0.3);
            border: 1px solid rgba(145, 70, 255, 0.5);
        }

        nav a:hover {
            background: rgba(145, 70, 255, 0.6);
            transform: translateY(-2px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #9146ff;
            text-shadow: -1px -1px 0 #140028, 1px -1px 0 #140028, -1px 1px 0 #140028, 1px 1px 0 #140028, 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .rules-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 10px;
            border: 2px solid rgba(145, 70, 255, 0.3);
            margin-bottom: 2rem;
        }

        .rule {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(145, 70, 255, 0.2);
        }

        .rule:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .rule-number {
            display: inline-block;
            background: linear-gradient(135deg, #9146ff 0%, #7c3aed 100%);
            color: #fff;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 1rem;
            vertical-align: top;
        }

        .rule-content {
            display: inline-block;
            width: calc(100% - 3.5rem);
            vertical-align: top;
        }

        .rule-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #9146ff;
            margin-bottom: 0.5rem;
            text-shadow: -1px -1px 0 #140028, 1px -1px 0 #140028, -1px 1px 0 #140028, 1px 1px 0 #140028;
        }

        .rule-description {
            opacity: 0.9;
            line-height: 1.6;
        }

        .consequences {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid rgba(255, 68, 68, 0.3);
            padding: 2rem;
            border-radius: 10px;
            margin-top: 2rem;
        }

        .consequences h3 {
            color: #ff4444;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .consequences ul {
            list-style: none;
            padding-left: 0;
        }

        .consequences li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            line-height: 1.6;
        }

        .consequences li:before {
            content: "⚠️";
            position: absolute;
            left: 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(145, 70, 255, 0.2);
            margin-top: 3rem;
        }

        .shared-footer-frame {
            width: 100%;
            height: 48px;
            border: 0;
            background: transparent;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .rules-section {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">← Back to Twitch Hub</a>
        <a href="pc-specs.html">PC Specs</a>
    </nav>

    <div class="container">
        <header>
            <h1 id="rules-title">Chat Rules</h1>
            <p class="subtitle" id="rules-subtitle">Loading rules...</p>
        </header>

        <div class="rules-section" id="rules-container">
            <p style="text-align: center;">Loading rules...</p>
        </div>

        <footer>
            <iframe class="shared-footer-frame" src="../footer.html" title="Site footer"></iframe>
        </footer>
    </div>
    <script>
        function renderRules(data) {
            const titleEl = document.getElementById('rules-title');
            const subtitleEl = document.getElementById('rules-subtitle');
            const container = document.getElementById('rules-container');

            titleEl.textContent = data.title || 'Chat Rules';
            subtitleEl.textContent = data.subtitle || 'Keep our community awesome and respectful';
            container.innerHTML = '';

            data.rules.forEach((rule, index) => {
                const ruleEl = document.createElement('div');
                ruleEl.className = 'rule';
                ruleEl.innerHTML = `
                    <span class="rule-number">${index + 1}</span>
                    <div class="rule-content">
                        <div class="rule-title">${rule.title}</div>
                        <div class="rule-description">${rule.description}</div>
                    </div>
                `;
                container.appendChild(ruleEl);
            });

            if (data.consequences && Array.isArray(data.consequences.items)) {
                const consequencesEl = document.createElement('div');
                consequencesEl.className = 'consequences';

                const heading = document.createElement('h3');
                heading.textContent = data.consequences.title || 'Consequences for Violations';
                consequencesEl.appendChild(heading);

                const list = document.createElement('ul');
                data.consequences.items.forEach((item) => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    list.appendChild(li);
                });

                consequencesEl.appendChild(list);
                container.appendChild(consequencesEl);
            }
        }

        async function loadRules() {
            try {
                const response = await fetch('chat-rules.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                renderRules(data);
            } catch (error) {
                console.error('Error loading chat rules:', error);
                document.getElementById('rules-container').innerHTML =
                    '<p style="color: #ff6b6b; text-align: center;">Error loading chat rules. Please try again.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadRules);
    </script>
    <script>
        (function () {
            const secret = 'comic';
            let typed = '';
            document.addEventListener('keydown', (e) => {
                typed = (typed + e.key).slice(-secret.length);
                if (typed.toLowerCase() === secret) {
                    document.body.style.fontFamily = document.body.style.fontFamily === 'Comic Sans MS, Comic Sans, cursive'
                        ? "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                        : 'Comic Sans MS, Comic Sans, cursive';
                }
            });
        })();
    </script>
</body>
</html>
